runtime:
  scripts:
    - type: after-response
      code: "try {\r

        \    const jsonData = res.getBody();\r

        \    if (jsonData && jsonData.key) {\r

        \        bru.setVar(\"key\", jsonData.key);\r

        \        console.log(\"key successfully set to collection variable:\", jsonData.key);\r

        \    } else {\r

        \        console.warn(\"key property not found in the response\");\r

        \    }\r

        } catch (error) {\r

        \    console.error(\"Failed to parse response as JSON:\", error.message);\r

        }"

