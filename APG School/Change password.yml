info:
  name: Change password
  type: http
  seq: 3

http:
  method: GET
  url: "{{URL}}api/v1/children/changePassword"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{TOKEN}}
  body:
    type: json
    data: |-
      {
        "Username": "111",
        "OldPassword": "111",
        "NewPassword": "123"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
