info:
  name: Students fee list
  type: http
  seq: 5

http:
  method: GET
  url: "{{URL}}api/v1/school/info/pages?pageId=abt"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{TOKEN}}
  params:
    - name: pageId
      value: abt
      type: query
  body:
    type: json
    data: ""
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
